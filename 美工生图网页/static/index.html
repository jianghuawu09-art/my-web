<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI图片生成服务</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 30px 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #a855f7, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header p {
            color: #94a3b8;
            font-size: 1rem;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .tab-btn {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.1);
            color: #94a3b8;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #a855f7, #6366f1);
            color: #fff;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4);
        }

        .tab-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.15);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            border-radius: 2px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #e2e8f0;
        }

        .form-group textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            font-size: 1rem;
            resize: vertical;
            min-height: 120px;
            transition: border-color 0.3s ease;
        }

        .form-group textarea.scenes-textarea {
            min-height: 200px;
            line-height: 1.8;
        }

        .form-group textarea:focus {
            outline: none;
            border-color: #a855f7;
        }

        .form-group textarea::placeholder {
            color: #64748b;
        }

        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .upload-area:hover {
            border-color: #a855f7;
            background: rgba(168, 85, 247, 0.1);
        }

        .upload-area.dragover {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.1);
        }

        .upload-area.has-image {
            padding: 16px;
            min-height: 280px;
        }

        .upload-area.has-image:hover .image-overlay {
            opacity: 1;
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
            color: #64748b;
            transition: opacity 0.3s ease;
        }

        .upload-text {
            color: #94a3b8;
            font-size: 1rem;
            transition: opacity 0.3s ease;
        }

        .upload-hint {
            color: #64748b;
            font-size: 0.875rem;
            margin-top: 5px;
            transition: opacity 0.3s ease;
        }

        .upload-area.has-image .upload-icon,
        .upload-area.has-image .upload-text,
        .upload-area.has-image .upload-hint {
            display: none;
        }

        .preview-image {
            max-width: 100%;
            max-height: 260px;
            border-radius: 10px;
            display: none;
            object-fit: contain;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .upload-area.has-image .preview-image {
            display: block;
        }

        .image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            border-radius: 10px;
            pointer-events: none;
        }

        .image-overlay-text {
            color: #fff;
            font-size: 1rem;
            font-weight: 500;
            background: rgba(168, 85, 247, 0.8);
            padding: 8px 20px;
            border-radius: 20px;
        }

        .btn {
            padding: 14px 40px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 auto;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(168, 85, 247, 0.5);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .btn.loading .spinner {
            display: block;
        }

        .btn.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .results {
            margin-top: 30px;
        }

        .result-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .result-title {
            font-weight: 600;
            color: #e2e8f0;
        }

        .result-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .result-status.success {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .result-status.error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .result-image {
            max-width: 400px;
            max-height: 400px;
            border-radius: 10px;
            margin: 10px 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .result-link {
            display: block;
            margin-top: 10px;
            padding: 10px;
            background: rgba(168, 85, 247, 0.1);
            border-radius: 8px;
            color: #a855f7;
            text-decoration: none;
            font-size: 0.875rem;
            word-break: break-all;
            transition: background 0.3s ease;
        }

        .result-link:hover {
            background: rgba(168, 85, 247, 0.2);
        }

        .result-error {
            color: #ef4444;
            font-size: 0.875rem;
            margin-top: 10px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
            min-width: 120px;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, #a855f7, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 0.875rem;
            color: #94a3b8;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
            
            .tab-btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
            
            .card {
                padding: 20px;
            }
            
            .result-image {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI图片生成服务</h1>
            <p>文生图 · 图生组图 · 一键生成</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('text-to-image')">文生图</button>
            <button class="tab-btn" onclick="switchTab('image-to-images')">图生组图</button>
        </div>

        <!-- 文生图模块 -->
        <div id="text-to-image" class="tab-content active">
            <div class="card">
                <div class="card-title">文生图生成</div>
                <div class="form-group">
                    <label for="text-prompt">画面描述</label>
                    <textarea id="text-prompt" placeholder="例如：未来感城市街道，雨后霓虹，电影级光影"></textarea>
                </div>
                <button class="btn" id="text-generate-btn" onclick="generateTextImage()">
                    <span class="spinner"></span>
                    <span class="btn-text">开始生成</span>
                </button>
            </div>

            <div class="card results" id="text-results" style="display: none;">
                <div class="card-title">生成结果</div>
                <div id="text-results-container"></div>
            </div>
        </div>

        <!-- 图生组图模块 -->
        <div id="image-to-images" class="tab-content">
            <div class="card">
                <div class="card-title">图生组图生成</div>
                
                <div class="form-group">
                    <label>参考图片</label>
                    <div class="upload-area" id="image-upload" onclick="document.getElementById('image-file').click()" ondragover="event.preventDefault(); this.classList.add('dragover')" ondragleave="this.classList.remove('dragover')" ondrop="event.preventDefault(); this.classList.remove('dragover'); handleDrop(event)">
                        <div class="upload-icon">📷</div>
                        <div class="upload-text">点击或拖拽上传参考图片</div>
                        <div class="upload-hint">支持 JPG、PNG 格式，建议图片尺寸适中</div>
                        <img id="image-preview" class="preview-image" alt="预览">
                        <div class="image-overlay">
                            <span class="image-overlay-text">点击更换图片</span>
                        </div>
                    </div>
                    <input type="file" id="image-file" accept="image/*" style="display: none;" onchange="handleImageSelect(event)">
                </div>

                <div class="form-group">
                    <label for="base-prompt">基础要求</label>
                    <textarea id="base-prompt" placeholder="例如：一位穿着时尚的女性，全身照，高质量，高清"></textarea>
                </div>

                <div class="form-group">
                    <label for="scenes">场景列表 <span style="font-weight:400;color:#a855f7;font-size:0.85rem;">（每行输入一个场景，自动识别）</span></label>
                    <div style="background:rgba(168,85,247,0.1);border-radius:8px;padding:12px 16px;margin-bottom:10px;font-size:0.875rem;color:#c7d2fe;">
                        <strong style="color:#a855f7;">💡 使用提示：</strong>
                        <ul style="margin:8px 0 0 18px;padding:0;list-style-type:disc;">
                            <li>每行输入一个场景描述，不用加序号</li>
                            <li>按 Enter 换行即可添加新场景</li>
                            <li>空行会自动忽略</li>
                        </ul>
                    </div>
                    <textarea id="scenes" class="scenes-textarea" placeholder="户外阳光明媚的街道&#10;室内温馨的咖啡厅&#10;夜晚繁华的都市&#10;海边沙滩度假&#10;森林自然风景"></textarea>
                </div>

                <button class="btn" id="image-generate-btn" onclick="generateImageGroup()">
                    <span class="spinner"></span>
                    <span class="btn-text">开始生成</span>
                </button>
            </div>

            <div class="card results" id="image-results" style="display: none;">
                <div class="card-title">生成结果</div>
                <div id="image-stats" class="stats"></div>
                <div id="image-results-container"></div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        async function generateTextImage() {
            const prompt = document.getElementById('text-prompt').value.trim();
            if (!prompt) {
                alert('请输入画面描述');
                return;
            }

            const btn = document.getElementById('text-generate-btn');
            btn.disabled = true;
            btn.classList.add('loading');

            const resultsDiv = document.getElementById('text-results');
            const container = document.getElementById('text-results-container');
            resultsDiv.style.display = 'block';
            container.innerHTML = '<div style="text-align: center; padding: 40px;">正在生成中，请稍候...</div>';

            try {
                const response = await fetch('/api/text-to-image', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `prompt=${encodeURIComponent(prompt)}`
                });

                const data = await response.json();

                let html = '';
                data.results.forEach((result, index) => {
                    html += `
                        <div class="result-card">
                            <div class="result-header">
                                <span class="result-title">模型 ${index + 1}: ${result.model}</span>
                                <span class="result-status ${result.success ? 'success' : 'error'}">${result.success ? '成功' : '失败'}</span>
                            </div>
                            ${result.success ? `
                                <img src="${result.url}" class="result-image" alt="生成图片" loading="lazy">
                                <a href="${result.url}" target="_blank" class="result-link">点击下载图片</a>
                            ` : `
                                <div class="result-error">错误信息: ${result.error}</div>
                            `}
                        </div>
                    `;
                });
                container.innerHTML = html;
            } catch (error) {
                container.innerHTML = `<div class="result-error">请求失败: ${error.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.classList.remove('loading');
            }
        }

        function handleImageSelect(event) {
            const file = event.target.files[0];
            if (file) {
                showImagePreview(file);
            }
        }

        function handleDrop(event) {
            const file = event.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                showImagePreview(file);
            }
        }

        function showImagePreview(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('image-preview');
                const uploadArea = document.getElementById('image-upload');
                preview.src = e.target.result;
                preview.style.display = 'block';
                uploadArea.classList.add('has-image');
            };
            reader.readAsDataURL(file);
        }

        async function generateImageGroup() {
            const fileInput = document.getElementById('image-file');
            const basePrompt = document.getElementById('base-prompt').value.trim();
            const scenes = document.getElementById('scenes').value.trim();

            if (!fileInput.files[0]) {
                alert('请上传参考图片');
                return;
            }
            if (!basePrompt) {
                alert('请输入基础要求');
                return;
            }

            const btn = document.getElementById('image-generate-btn');
            btn.disabled = true;
            btn.classList.add('loading');

            const resultsDiv = document.getElementById('image-results');
            const container = document.getElementById('image-results-container');
            const statsDiv = document.getElementById('image-stats');
            resultsDiv.style.display = 'block';
            container.innerHTML = '<div style="text-align: center; padding: 40px;">正在生成中，请稍候（每张图片约需120秒）...</div>';
            statsDiv.innerHTML = '';

            const formData = new FormData();
            formData.append('image', fileInput.files[0]);
            formData.append('base_prompt', basePrompt);
            formData.append('scenes', scenes);

            try {
                const response = await fetch('/api/image-to-images', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                statsDiv.innerHTML = `
                    <div class="stat-item">
                        <div class="stat-value">${data.success_count}/${data.total_count}</div>
                        <div class="stat-label">生成成功率</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value">${data.model}</div>
                        <div class="stat-label">使用模型</div>
                    </div>
                `;

                let html = '';
                data.results.forEach((result, index) => {
                    html += `
                        <div class="result-card">
                            <div class="result-header">
                                <span class="result-title">场景 ${index + 1}: ${result.scene}</span>
                                <span class="result-status ${result.success ? 'success' : 'error'}">${result.success ? '成功' : '失败'}</span>
                            </div>
                            ${result.success ? `
                                <img src="${result.url}" class="result-image" alt="生成图片" loading="lazy">
                                <a href="${result.url}" target="_blank" class="result-link">点击下载图片</a>
                            ` : `
                                <div class="result-error">错误信息: ${result.error}</div>
                            `}
                        </div>
                    `;
                });
                container.innerHTML = html;
            } catch (error) {
                container.innerHTML = `<div class="result-error">请求失败: ${error.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.classList.remove('loading');
            }
        }
    </script>
</body>
</html>
